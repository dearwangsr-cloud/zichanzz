<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资产增长预测工具</title>
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="资产增长预测工具">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --border: #cbd5e1;
            --text-main: #1e293b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 8px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 { text-align: center; font-size: 18px; margin: 0 0 12px; color: var(--primary); }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            column-gap: 10px;
            row-gap: 8px;
            margin-bottom: 10px;
        }

        .input-group { display: flex; flex-direction: column; }
        label { font-size: 10px; color: #64748b; margin-bottom: 2px; font-weight: 600; }
        input {
            width: 100%;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .section-box { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px; }
        .section-header { padding: 5px 10px; font-size: 11px; background: #f8fafc; color: #475569; font-weight: bold; border-bottom: 1px solid #e2e8f0; }
        .section-content { padding: 8px; }

        .dynamic-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            align-items: flex-end;
            background: #f8fafc;
            padding: 6px;
            border-radius: 6px;
        }
        .row-item { flex: 1; display: flex; flex-direction: column; }
        .row-item label { font-size: 9px; color: #94a3b8; }
        .row-item input { font-size: 12px; padding: 4px; border-color: #d1d5db; }
        
        /* Checkbox 特殊处理 */
        input[type="checkbox"] { width: 14px; height: 14px; margin: 0; padding: 0; accent-color: var(--primary); }
        .checkbox-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-right: 4px; cursor: pointer; white-space: nowrap; }

        .btn-calc { 
            background: var(--primary); color: white; width: 100%; padding: 12px; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin: 8px 0;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
            cursor: pointer;
        }
        .btn-add { 
            background: #fff; color: var(--primary); border: 1px dashed var(--primary); 
            padding: 5px; border-radius: 6px; font-size: 11px; width: 100%; font-weight: 600;
        }
        .btn-remove { 
            background: #fee2e2; color: #ef4444; border: none; 
            width: 24px; height: 24px; border-radius: 6px; font-weight: bold; flex-shrink: 0;
        }

        .chart-container { height: 200px; margin: 8px 0; }
        
        /* 表格精细化列宽控制与嵌套排版 */
        .table-unit { font-size: 9px; color: #94a3b8; text-align: right; margin-bottom: 2px; }
        .table-scroll { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th, td { padding: 6px 1px; border-bottom: 1px solid #f1f5f9; text-align: right; word-break: break-all; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; line-height: 1.1; vertical-align: middle; }
        
        .val-main { display: block; }
        .val-sub { display: block; font-size: 9px; color: #10b981; margin-top: 1px; }

        /* 列宽分配 */
        .col-year { width: 12%; text-align: left; padding-left: 4px; color: var(--primary); }
        .col-sav { width: 18%; }
        .col-inv { width: 18%; }
        .col-loan { width: 16%; color: #ef4444; }
        .col-net { width: 18%; font-weight: bold; color: #0f172a; }
        .col-pp { width: 18%; padding-right: 4px; font-weight: bold; color: #4f46e5; } 

        @media (min-width: 600px) {
            .chart-container { height: 300px; }
            table { font-size: 13px; }
            th, td { padding: 10px 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>资产增长预测工具</h1>

    <div class="grid-inputs">
        <div class="input-group"><label>月收入(元)</label><input type="number" id="monthlyIncome" value="10000"></div>
        <div class="input-group"><label>月支出(元)</label><input type="number" id="monthlyExpense" value="5000"></div>
        <div class="input-group"><label>当前储蓄(元)</label><input type="number" id="initSavings" value="100000"></div>
        <div class="input-group"><label>储蓄收益%</label><input type="number" id="savingsRate" value="2" step="0.1"></div>
        <div class="input-group"><label>预测年限</label><input type="number" id="years" value="20"></div>
        <div class="input-group"><label>通胀率%</label><input type="number" id="inflationRate" value="2" step="0.1"></div>
    </div>

    <div class="section-box">
        <div class="section-header">理财账户 (可选)</div>
        <div class="section-content">
            <div id="invest-list"></div>
            <button class="btn-add" onclick="addItem('invest-list')">+ 添加账户</button>
        </div>
    </div>

    <div class="section-box">
        <div class="section-header">大宗贷款 (可选)</div>
        <div class="section-content">
            <div id="loan-list"></div>
            <button class="btn-add" onclick="addItem('loan-list')">+ 添加贷款</button>
        </div>
    </div>

    <div class="section-box">
        <div class="section-header">大宗支出 (可选)</div>
        <div class="section-content">
            <div id="expense-list"></div>
            <button class="btn-add" onclick="addItem('expense-list')">+ 添加计划</button>
        </div>
    </div>

    <button class="btn-calc" onclick="calculate()">计算并绘制资产曲线</button>

    <div class="chart-container"><canvas id="assetChart"></canvas></div>

    <div class="table-unit">单位: 万元</div>
    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th class="col-year">年份</th>
                    <th class="col-sav">储蓄<br><span style="font-size:9px;font-weight:normal">(当年收益)</span></th>
                    <th class="col-inv">理财<br><span style="font-size:9px;font-weight:normal">(当年收益)</span></th>
                    <th class="col-loan">贷款<br>余额</th>
                    <th class="col-net">净资产</th>
                    <th class="col-pp" id="th-pp">购买力</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let myChart = null;

    function addItem(containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        if (containerId === 'invest-list') {
            div.innerHTML = `
                <div class="row-item"><label>已有</label><input type="number" class="inv-init" value="0"></div>
                <div class="row-item"><label>月投</label><input type="number" class="inv-amount" value="2000"></div>
                <div class="row-item"><label>年化%</label><input type="number" class="inv-rate" value="5.0"></div>
                <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
            `;
        } else if (containerId === 'loan-list') {
            div.innerHTML = `
                <div class="row-item"><label>起始年</label><input type="number" class="loan-year" value="1"></div>
                <div class="row-item"><label>金额</label><input type="number" class="loan-amount" value="1000000"></div>
                <div class="row-item"><label>利率%</label><input type="number" class="loan-rate" value="4.5"></div>
                <div class="row-item"><label>年限</label><input type="number" class="loan-term" value="30"></div>
                <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
            `;
        } else {
            div.innerHTML = `
                <div class="row-item"><label>第几年</label><input type="number" class="exp-year" value="5"></div>
                <div class="row-item"><label>金额</label><input type="number" class="exp-amount" value="50000"></div>
                <label class="checkbox-container">
                    <input type="checkbox" class="exp-use-inv">
                    <span style="font-size:9px;color:#64748b;margin-top:2px;">用理财账户补充</span>
                </label>
                <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
            `;
        }
        container.appendChild(div);
    }

    function calculate() {
        // 基础参数
        const monthlyIncome = parseFloat(document.getElementById('monthlyIncome').value) || 0;
        const monthlyExpense = parseFloat(document.getElementById('monthlyExpense').value) || 0;
        let curSav = parseFloat(document.getElementById('initSavings').value) || 0;
        const savRate = (parseFloat(document.getElementById('savingsRate').value) || 0) / 100;
        const years = parseInt(document.getElementById('years').value) || 1;
        const inflationRate = parseFloat(document.getElementById('inflationRate').value) || 0;

        document.getElementById('th-pp').innerHTML = `购买力<br><span style="font-size:9px;font-weight:normal">(-${inflationRate}%)</span>`;

        // 理财数据
        const invInitials = Array.from(document.querySelectorAll('.inv-init')).map(i => parseFloat(i.value) || 0);
        const invAmounts = Array.from(document.querySelectorAll('.inv-amount')).map(i => parseFloat(i.value) || 0);
        const invRates = Array.from(document.querySelectorAll('.inv-rate')).map(i => (parseFloat(i.value) || 0) / 100);
        let totalMonthlyInv = invAmounts.reduce((a, b) => a + b, 0);
        let curInvAssets = [...invInitials];

        // 贷款数据
        const loanYears = Array.from(document.querySelectorAll('.loan-year')).map(i => Math.max(1, parseInt(i.value) || 1));
        const loanAmounts = Array.from(document.querySelectorAll('.loan-amount')).map(i => parseFloat(i.value) || 0);
        const loanRates = Array.from(document.querySelectorAll('.loan-rate')).map(i => (parseFloat(i.value) || 0) / 100);
        const loanTerms = Array.from(document.querySelectorAll('.loan-term')).map(i => parseInt(i.value) || 1);
        
        const loans = loanYears.map((y, idx) => {
            let p = loanAmounts[idx];
            let r = loanRates[idx] / 12;
            let n = loanTerms[idx] * 12;
            let monthlyPmt = 0;
            if (r > 0) monthlyPmt = p * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
            else if (n > 0) monthlyPmt = p / n;
            return { year: y, amount: p, monthRate: r, months: n, monthlyPmt: monthlyPmt };
        });

        // 支出数据
        const expYears = Array.from(document.querySelectorAll('.exp-year')).map(i => parseInt(i.value));
        const expAmounts = Array.from(document.querySelectorAll('.exp-amount')).map(i => parseFloat(i.value));
        const expUseInv = Array.from(document.querySelectorAll('.exp-use-inv')).map(i => i.checked);

        const labels = [], dSav = [], dInv = [], dNet = [], dLoan = [];
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        for (let y = 0; y <= years; y++) {
            let ySavP = 0, yInvP = 0;
            let yearEndTotalLoan = 0;

            if (y > 0) {
                // 按月计算复利、定投、房贷还款
                for (let m = 1; m <= 12; m++) {
                    let currentMonth = (y - 1) * 12 + m;
                    
                    // 理财增长
                    invAmounts.forEach((add, idx) => {
                        let p = curInvAssets[idx] * (invRates[idx] / 12);
                        yInvP += p; 
                        curInvAssets[idx] += p + add;
                    });

                    // 贷款月供及余额统计
                    let monthlyLoanPmt = 0;
                    let monthEndTotalLoan = 0;
                    loans.forEach(loan => {
                        let startMonth = (loan.year - 1) * 12 + 1;
                        let endMonth = startMonth + loan.months - 1;
                        
                        if (currentMonth >= startMonth && currentMonth <= endMonth) {
                            monthlyLoanPmt += loan.monthlyPmt;
                            let k = currentMonth - startMonth + 1; // 已还期数
                            let remainingP = 0;
                            if (loan.monthRate > 0) {
                                remainingP = loan.amount * (Math.pow(1 + loan.monthRate, loan.months) - Math.pow(1 + loan.monthRate, k)) / (Math.pow(1 + loan.monthRate, loan.months) - 1);
                            } else {
                                remainingP = loan.amount - loan.monthlyPmt * k;
                            }
                            monthEndTotalLoan += Math.max(0, remainingP);
                        }
                    });
                    if (m === 12) yearEndTotalLoan = monthEndTotalLoan;

                    // 储蓄增长与扣款
                    let sP = curSav * (savRate / 12);
                    ySavP += sP; 
                    curSav += sP + (monthlyIncome - monthlyExpense - totalMonthlyInv - monthlyLoanPmt);

                    // 月度智能抵扣逻辑：如果因为月供或定投导致储蓄为负，自动从理财账户填补
                    if (curSav < 0) {
                        let shortfall = -curSav;
                        curSav = 0;
                        for (let i = 0; i < curInvAssets.length; i++) {
                            if (curInvAssets[i] >= shortfall) {
                                curInvAssets[i] -= shortfall;
                                shortfall = 0; 
                                break;
                            } else {
                                shortfall -= curInvAssets[i];
                                curInvAssets[i] = 0;
                            }
                        }
                        if (shortfall > 0) curSav = -shortfall; // 如果理财扣尽仍不足，储蓄则为负
                    }
                }

                // 大宗支出结算 (年末)
                expYears.forEach((ey, idx) => { 
                    if (ey === y) {
                        let cost = expAmounts[idx];
                        let useInv = expUseInv[idx];
                        curSav -= cost;
                        
                        // 大宗支出的抵扣逻辑
                        if (useInv && curSav < 0) {
                            let shortfall = -curSav;
                            curSav = 0;
                            for (let i = 0; i < curInvAssets.length; i++) {
                                if (curInvAssets[i] >= shortfall) {
                                    curInvAssets[i] -= shortfall;
                                    shortfall = 0; break;
                                } else {
                                    shortfall -= curInvAssets[i];
                                    curInvAssets[i] = 0;
                                }
                            }
                            if (shortfall > 0) curSav = -shortfall; 
                        }
                    } 
                });
            }

            // 统计制表
            let totalInv = curInvAssets.reduce((a, b) => a + b, 0);
            let netAsset = curSav + totalInv - yearEndTotalLoan;
            let purchasingPower = netAsset / Math.pow(1 + inflationRate / 100, y);

            labels.push(`${y}年`);
            dSav.push((curSav / 10000).toFixed(2));
            dInv.push((totalInv / 10000).toFixed(2));
            dLoan.push((yearEndTotalLoan / 10000).toFixed(2));
            dNet.push((netAsset / 10000).toFixed(2));

            // 构建表格单元格内的文字 (节省空间)
            let savDisplay = `<span class="val-main">${(curSav / 10000).toFixed(1)}</span>`;
            if (y > 0) savDisplay += `<span class="val-sub">+${(ySavP / 10000).toFixed(1)}</span>`;
            else savDisplay += `<span class="val-sub">-</span>`;

            let invDisplay = `<span class="val-main">${(totalInv / 10000).toFixed(1)}</span>`;
            if (y > 0) invDisplay += `<span class="val-sub">+${(yInvP / 10000).toFixed(1)}</span>`;
            else invDisplay += `<span class="val-sub">-</span>`;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-year">${y}年</td>
                <td class="col-sav">${savDisplay}</td>
                <td class="col-inv">${invDisplay}</td>
                <td class="col-loan">${yearEndTotalLoan === 0 ? '-' : (yearEndTotalLoan / 10000).toFixed(1)}</td>
                <td class="col-net">${(netAsset / 10000).toFixed(1)}</td>
                <td class="col-pp">${(purchasingPower / 10000).toFixed(1)}</td>
            `;
            tableBody.appendChild(tr);
        }
        renderChart(labels, dSav, dInv, dLoan, dNet);
    }

    function renderChart(labels, savings, invest, loan, netAsset) {
        const ctx = document.getElementById('assetChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '净资产', data: netAsset, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.3, borderWidth: 2, pointRadius: 2, hitRadius: 15 },
                    { label: '储蓄', data: savings, borderColor: '#10b981', borderDash: [5, 5], tension: 0.3, pointRadius: 0 },
                    { label: '理财', data: invest, borderColor: '#f59e0b', borderDash: [5, 5], tension: 0.3, pointRadius: 0 },
                    { label: '贷款余额', data: loan, borderColor: '#ef4444', borderDash: [3, 3], tension: 0.3, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { 
                    legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                    tooltip: { callbacks: { label: (c) => c.dataset.label + ': ' + c.parsed.y + ' 万' } }
                },
                scales: { 
                    y: { ticks: { font: { size: 10 } } },
                    x: { ticks: { font: { size: 10 }, maxRotation: 0 } }
                }
            }
        });
    }
    window.onload = calculate;
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
